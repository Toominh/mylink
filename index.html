<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLink Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    <style>
        /* CSS - Darkmode & Biến cục bộ */
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-color: #bb86fc;
            --secondary-color: #03dac6;
            --danger-color: #cf6679;
            --border-color: #333333;
            --link-color: #90caf9;
            --link-font-size: 22px; 
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 30px; }

        /* HEADER THỜI GIAN VÀ GHI CHÚ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--surface-color);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .date-display {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            text-transform: capitalize;
            text-align: center;
            flex: 1;
        }

        .time-display {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 2px;
            min-width: 120px;
            text-align: right;
        }

        /* KHU VỰC GHI CHÚ (TEXTAREA) */
        .notes-panel {
            display: none; /* Mặc định ẩn */
            background-color: #000;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: opacity 0.3s ease;
            flex-direction: column;
        }

        .notes-panel textarea {
            width: 100%;
            height: 300px;
            background-color: #000;
            color: #cacaca;
            border: none;
            resize: vertical;
            outline: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }

        .notes-panel textarea::placeholder {
            color: #555;
        }

        /* --- CSS MỚI CHO GHI CHÚ & TAB --- */
        .notes-panel.fullscreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; margin: 0; border-radius: 0;
            display: flex; flex-direction: column; padding: 10px; /* Giảm padding để tràn viền */
        }

        .notes-panel.fullscreen textarea {
            flex-grow: 1; height: 100%; min-height: 85vh; resize: none; margin-top: 5px;
        }

        /* Khu vực Header của Ghi chú (Chứa Tab và Nút) */
        .notes-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid #333; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;
        }

        /* Vùng chứa các Tab */
        .tabs-container {
            display: flex; gap: 5px; overflow-x: auto; flex: 1; padding-top: 5px;
        }

        /* Giao diện từng Tab */
        .note-tab {
            padding: 8px 15px; background-color: #252525; border-radius: 8px 8px 0 0;
            cursor: pointer; color: #aaa; display: flex; align-items: center; gap: 8px;
            border: 1px solid transparent; border-bottom: none; white-space: nowrap;
            font-size: 14px; font-weight: 500; transition: background-color 0.2s;
        }

        .note-tab.active { background-color: #000; color: var(--primary-color); border-color: #333; }
        .note-tab:hover:not(.active) { background-color: #2c2c2c; }
        
        .note-tab i.fa-times { font-size: 12px; color: #666; transition: color 0.2s; padding: 2px; }
        .note-tab i.fa-times:hover { color: var(--danger-color); }

        .notes-actions { display: flex; align-items: center; gap: 8px; padding-bottom: 5px; }

        /* Khu vực Header / Control - Nằm ở chân trang */
        .header-controls {
            background-color: var(--surface-color);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }

        .input-group { display: flex; gap: 10px; align-items: center; flex: 1; min-width: 300px; }
        .action-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        input[type="text"] {
            padding: 10px; border-radius: 6px; border: 1px solid var(--border-color);
            background-color: #2c2c2c; color: var(--text-color); flex: 1; font-size: 14px;
        }

        button {
            padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer;
            font-weight: bold; font-size: 13px; transition: all 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        
        .btn-primary { background-color: var(--primary-color); color: #000; }
        .btn-secondary { background-color: var(--secondary-color); color: #000; }
        .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-color); }
        .btn-icon { background-color: #333; color: white; padding: 10px; }

        /* Masonry Layout hiển thị Thư mục */
        .folders-grid {
            column-width: 320px;
            column-gap: 20px;
        }

        .folder-box {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: grab;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s;
            overflow: hidden;
            
            break-inside: avoid;
            page-break-inside: avoid;
            margin-bottom: 20px;
        }

        .folder-box-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .folder-box:active { cursor: grabbing; }
        .folder-box.drag-over { border: 2px dashed var(--primary-color); opacity: 0.7; }

        .folder-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 18px; font-weight: bold; 
            padding: 15px; 
            border-bottom: 1px solid var(--border-color); 
        }
        
        .folder-title { display: flex; align-items: center; gap: 10px; flex: 1; }
        .folder-title i { transition: transform 0.2s; cursor: pointer; color: var(--primary-color); }
        .folder-title i:hover { transform: scale(1.2); }
        
        .folder-actions { display: flex; gap: 10px; align-items: center; }
        
        .btn-mini {
            background: none; border: none; color: var(--text-color); cursor: pointer;
            font-size: 16px; padding: 5px; transition: color 0.2s;
        }
        .btn-mini:hover { color: var(--primary-color); }
        .btn-add-link { color: var(--secondary-color); }

        .folder-box.collapsed .links-list { display: none; }
        .folder-box.collapsed .fa-chevron-up { transform: rotate(180deg); }

        /* Danh sách Link */
        .links-list { list-style: none; padding: 0; margin: 15px 0 0 0; flex-grow: 1; min-height: 20px; }
        .links-list li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; border-radius: 6px; margin-bottom: 5px; background-color: #252525;
            cursor: grab; transition: border 0.1s;
        }
        .links-list li:active { cursor: grabbing; }
        .links-list li:hover { background-color: #2c2c2c; }

        .links-list a {
            color: var(--link-color); text-decoration: none; display: flex; align-items: center; gap: 10px;
            font-size: var(--link-font-size); 
            word-break: break-word; flex: 1;
        }
        .links-list a:hover { text-decoration: underline; }
        
        .link-icon { color: var(--secondary-color); font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .link-icon:hover { transform: scale(1.3); color: #fff; }

        .btn-delete { color: var(--danger-color); }

        /* Modals */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: var(--surface-color); padding: 25px; border-radius: 10px;
            width: 90%; max-width: 400px; border: 1px solid var(--border-color);
        }
        .modal-content h3 { margin-top: 0; color: var(--secondary-color); }
        .modal-content input { width: 100%; margin-bottom: 15px; }
        .modal-content label { display: block; margin-bottom: 5px; font-size: 14px; color: #aaa; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        
        input[type="color"] { width: 60px; height: 35px; padding: 2px; cursor: pointer; background: none; border: 1px solid #444; }

        /* Tiện ích ẩn */
        #importFile { display: none; }

        /* --- Trạng thái khi tắt kéo thả --- */
        body.drag-disabled .folder-box,
        body.drag-disabled .links-list li {
            cursor: default;
        }
        body.drag-disabled .folder-box:active,
        body.drag-disabled .links-list li:active {
            cursor: default;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="top-bar">
        <button class="btn-primary" onclick="toggleNotes()">
            <i class="fas fa-edit"></i> Note
        </button>
        <div class="date-display" id="currentDate">Đang tải ngày...</div>
        <div class="time-display" id="currentTime">--:--</div>
    </div>

    <div class="notes-panel" id="notesPanel">
        <div class="notes-header">
            <div class="tabs-container" id="notesTabsContainer">
                </div>
            
            <div class="notes-actions">
                <button class="btn-mini" onclick="addNoteTab()" title="Thêm Tab mới"><i class="fas fa-plus"></i></button>
                <div style="width: 1px; height: 15px; background-color: #444; margin: 0 5px;"></div>
                
                <span style="color: #aaa; font-size: 14px;">Cỡ chữ:</span>
                <button class="btn-mini" onclick="changeNotesFontSize(-2)" title="Thu nhỏ chữ"><i class="fas fa-minus"></i></button>
                <button class="btn-mini" onclick="changeNotesFontSize(2)" title="Phóng to chữ"><i class="fas fa-plus"></i></button>
                
                <div style="width: 1px; height: 15px; background-color: #444; margin: 0 5px;"></div>
                <button class="btn-mini" onclick="toggleFullscreen()" title="Toàn màn hình"><i id="fullscreenIcon" class="fas fa-expand"></i></button>
            </div>
        </div>
        <textarea id="notesArea" placeholder="Nhập nội dung ghi chép ở đây. Dữ liệu tự động lưu... (Nháy đúp vào tên Tab để đổi tên)"></textarea>
    </div>

    <div class="folders-grid" id="foldersContainer"></div>

    <div class="header-controls">
        <div class="input-group">
            <input type="text" id="newFolderName" placeholder="Tên thư mục mới..." onkeypress="if(event.key === 'Enter') addFolder()">
            <button class="btn-primary" onclick="addFolder()"><i class="fas fa-folder-plus"></i> Tạo Thư Mục</button>
        </div>
        
        <div class="action-group">
            <button id="btnToggleDrag" class="btn-outline" onclick="toggleDragDrop()" title="Bật/tắt chế độ kéo thả">
                <i class="fas fa-hand-rock"></i> Kéo thả: BẬT
            </button>

            <div style="display: flex; align-items: center; gap: 5px; background: #333; padding: 2px 10px; border-radius: 6px; margin-right: 10px;">
                <span style="font-size: 12px; color: #888;">Font Link:</span>
                <button class="btn-mini" onclick="changeFontSize(-1)"><i class="fas fa-minus"></i></button>
                <span id="fontSizeDisplay" style="font-weight: bold; min-width: 20px; text-align: center;">22</span>
                <button class="btn-mini" onclick="changeFontSize(1)"><i class="fas fa-plus"></i></button>
            </div>
            <button class="btn-outline" onclick="expandAll()" title="Mở rộng tất cả các thư mục">
                <i class="fas fa-expand-arrows-alt"></i> Mở rộng
            </button>
            <button class="btn-outline" onclick="collapseAll()" title="Thu gọn tất cả các thư mục">
                <i class="fas fa-compress-arrows-alt"></i> Thu gọn
            </button>
            <input type="file" id="importFile" accept=".json" onchange="handleImport(event)">
            <button class="btn-outline" onclick="triggerImport()" title="Nhập dữ liệu từ file JSON">
                <i class="fas fa-upload"></i> Import Data
            </button>
            <button class="btn-outline" onclick="exportData()" title="Xuất dữ liệu ra file JSON">
                <i class="fas fa-file-code"></i> Export Data
            </button>

            <button class="btn-secondary" onclick="exportHTML()">
                <i class="fas fa-download"></i> Xuất file HTML
            </button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="linkModal">
    <div class="modal-content">
        <h3><i class="fas fa-plus-circle"></i> Thêm Link</h3>
        <input type="hidden" id="targetFolderId">
        <input type="text" id="modalLinkName" placeholder="Tên trang web...">
        <input type="text" id="modalLinkUrl" placeholder="Địa chỉ URL (VD: google.com)..." onkeypress="if(event.key === 'Enter') saveNewLink()">
        <div class="modal-actions">
            <button class="btn-outline" onclick="closeModal('linkModal')">Hủy</button>
            <button class="btn-secondary" onclick="saveNewLink()">Thêm Ngay</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="editLinkModal">
    <div class="modal-content">
        <h3><i class="fas fa-edit"></i> Chỉnh Sửa Link</h3>
        <input type="hidden" id="editFolderIndexTarget">
        <input type="hidden" id="editLinkIdTarget">
        <label>Tên hiển thị:</label>
        <input type="text" id="editLinkName">
        <label>Địa chỉ (URL):</label>
        <input type="text" id="editLinkUrl" onkeypress="if(event.key === 'Enter') saveEditLink()">
        <div class="modal-actions">
            <button class="btn-outline" onclick="closeModal('editLinkModal')">Hủy</button>
            <button class="btn-secondary" onclick="saveEditLink()">Cập Nhật</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="editFolderModal">
    <div class="modal-content">
        <h3><i class="fas fa-folder-open"></i> Sửa Thư Mục</h3>
        <input type="hidden" id="editFolderIndex">
        <label>Tên thư mục:</label>
        <input type="text" id="editFolderName" onkeypress="if(event.key === 'Enter') saveEditFolder()">
        <label>Màu nền tiêu đề:</label>
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
            <input type="color" id="editFolderColor">
            <span style="font-size: 12px;">Click chọn màu</span>
        </div>
        <div class="modal-actions">
            <button class="btn-outline" onclick="closeModal('editFolderModal')">Hủy</button>
            <button class="btn-secondary" onclick="saveEditFolder()">Lưu Thay Đổi</button>
        </div>
    </div>
</div>

<script id="data-store">
// --- DATA_START ---
var INITIAL_DATA = [];
var INITIAL_FONT_SIZE = 22;
// --- DATA_END ---
</script>

<script>
    // 1. STATE & KHỞI TẠO
    let folders = (INITIAL_DATA && INITIAL_DATA.length > 0) ? INITIAL_DATA : (JSON.parse(localStorage.getItem('bm_folders')) || []);
    let currentFontSize = parseInt(localStorage.getItem('bm_fontsize')) || INITIAL_FONT_SIZE || 22;
    let notesFontSize = parseInt(localStorage.getItem('bm_notes_fontsize')) || 18;
    
    let noteTabs = JSON.parse(localStorage.getItem('bm_notes_tabs')) || [{ id: 'tab_1', title: 'Ghi chú 1', content: localStorage.getItem('bm_notes_content') || '' }];
    let activeTabId = localStorage.getItem('bm_active_tab') || noteTabs[0].id;

    let isDragEnabled = localStorage.getItem('bm_drag_enabled') !== 'false'; // Mặc định là true (Bật)

    let draggedType = null;
    let draggedFolderIndex = null;
    let draggedLinkInfo = null;

    function init() {
        applyFontSize();
        initHeaderAndNotes();
        updateDragDropUI();
        render();
    }

    // --- HÀM XỬ LÝ BẬT/TẮT KÉO THẢ ---
    function toggleDragDrop() {
        isDragEnabled = !isDragEnabled;
        localStorage.setItem('bm_drag_enabled', isDragEnabled);
        updateDragDropUI();
        render(); // Render lại để gắn/gỡ thuộc tính draggable
    }

    function updateDragDropUI() {
        const btn = document.getElementById('btnToggleDrag');
        if (!btn) return;
        
        if (isDragEnabled) {
            btn.innerHTML = '<i class="fas fa-hand-rock"></i> Kéo thả: BẬT';
            btn.style.color = 'var(--secondary-color)';
            btn.style.borderColor = 'var(--secondary-color)';
            document.body.classList.remove('drag-disabled');
        } else {
            btn.innerHTML = '<i class="fas fa-hand-paper"></i> Kéo thả: TẮT';
            btn.style.color = '#888';
            btn.style.borderColor = '#444';
            document.body.classList.add('drag-disabled');
        }
    }

    // --- TÍNH NĂNG GHI CHÚ VÀ THỜI GIAN ---
    function initHeaderAndNotes() {
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // Khởi tạo hiển thị Tab và nội dung
        renderNoteTabs();
        loadActiveNote();

        const notesArea = document.getElementById('notesArea');
        notesArea.style.fontSize = notesFontSize + 'px';

        // Lắng nghe sự kiện gõ phím để lưu vào Tab đang mở
        notesArea.addEventListener('input', function() {
            const activeTab = noteTabs.find(t => t.id === activeTabId);
            if (activeTab) {
                activeTab.content = this.value;
                saveNotesState();
            }
        });
    }

    // --- CÁC HÀM XỬ LÝ TAB GHI CHÚ ---
    function saveNotesState() {
        localStorage.setItem('bm_notes_tabs', JSON.stringify(noteTabs));
        localStorage.setItem('bm_active_tab', activeTabId);
    }

    function renderNoteTabs() {
        const container = document.getElementById('notesTabsContainer');
        container.innerHTML = noteTabs.map(tab => `
            <div class="note-tab ${tab.id === activeTabId ? 'active' : ''}" 
                 onclick="switchNoteTab('${tab.id}')" 
                 ondblclick="renameTab('${tab.id}')"
                 title="Nháy đúp để đổi tên">
                <span>${tab.title}</span>
                ${noteTabs.length > 1 ? `<i class="fas fa-times" onclick="event.stopPropagation(); deleteNoteTab('${tab.id}')"></i>` : ''}
            </div>
        `).join('');
    }

    function loadActiveNote() {
        const activeTab = noteTabs.find(t => t.id === activeTabId);
        if (activeTab) {
            document.getElementById('notesArea').value = activeTab.content;
        }
    }

    function switchNoteTab(id) {
        activeTabId = id;
        saveNotesState();
        renderNoteTabs();
        loadActiveNote();
        document.getElementById('notesArea').focus();
    }

    function addNoteTab() {
        const newId = 'tab_' + Date.now();
        noteTabs.push({ id: newId, title: 'Ghi chú ' + (noteTabs.length + 1), content: '' });
        activeTabId = newId;
        saveNotesState();
        renderNoteTabs();
        loadActiveNote();
    }

    function deleteNoteTab(id) {
        if (confirm('Bạn có chắc muốn xóa tab ghi chú này? Toàn bộ nội dung trong tab sẽ bị mất.')) {
            noteTabs = noteTabs.filter(t => t.id !== id);
            if (activeTabId === id) {
                activeTabId = noteTabs[noteTabs.length - 1].id; // Chuyển sang tab cuối cùng
            }
            saveNotesState();
            renderNoteTabs();
            loadActiveNote();
        }
    }

    function renameTab(id) {
        const tab = noteTabs.find(t => t.id === id);
        const newName = prompt('Nhập tên mới cho tab:', tab.title);
        if (newName && newName.trim() !== '') {
            tab.title = newName.trim();
            saveNotesState();
            renderNoteTabs();
        }
    }

    function updateDateTime() {
        const now = new Date();
        const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
        const dayName = days[now.getDay()];
        const date = now.getDate().toString().padStart(2, '0');
        const month = (now.getMonth() + 1).toString().padStart(2, '0');
        const year = now.getFullYear();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');

        document.getElementById('currentDate').innerText = `${dayName}, ${date}/${month}/${year}`;
        document.getElementById('currentTime').innerText = `${hours}:${minutes}`;
    }

    function toggleNotes() {
        const panel = document.getElementById('notesPanel');
        if (panel.style.display === 'none' || panel.style.display === '') {
            panel.style.display = 'flex';
            document.getElementById('notesArea').focus();
        } else {
            panel.style.display = 'none';
            if (panel.classList.contains('fullscreen')) {
                toggleFullscreen();
            }
        }
    }

    function changeNotesFontSize(step) {
        notesFontSize = Math.max(12, Math.min(notesFontSize + step, 40));
        document.getElementById('notesArea').style.fontSize = notesFontSize + 'px';
        localStorage.setItem('bm_notes_fontsize', notesFontSize);
    }

    function toggleFullscreen() {
        const panel = document.getElementById('notesPanel');
        const icon = document.getElementById('fullscreenIcon');
        
        panel.classList.toggle('fullscreen');
        
        if (panel.classList.contains('fullscreen')) {
            icon.classList.remove('fa-expand');
            icon.classList.add('fa-compress');
            document.body.style.overflow = 'hidden'; 
        } else {
            icon.classList.remove('fa-compress');
            icon.classList.add('fa-expand');
            document.body.style.overflow = '';
        }
    }

    function saveAndRender() {
        localStorage.setItem('bm_folders', JSON.stringify(folders));
        localStorage.setItem('bm_fontsize', currentFontSize);
        render();
    }

    // 2. THAO TÁC THƯ MỤC
    function addFolder() {
        const input = document.getElementById('newFolderName');
        const name = input.value.trim();
        if (!name) return;
        folders.push({ id: 'f_' + Date.now(), name: name, isCollapsed: false, links: [], color: '#1e1e1e' });
        input.value = '';
        saveAndRender();
    }

    function toggleFolder(index) {
        folders[index].isCollapsed = !folders[index].isCollapsed;
        saveAndRender();
    }

    function deleteFolder(index) {
        if(confirm(`Xóa thư mục "${folders[index].name}"?`)) {
            folders.splice(index, 1);
            saveAndRender();
        }
    }

    function openEditFolder(index) {
        document.getElementById('editFolderIndex').value = index;
        document.getElementById('editFolderName').value = folders[index].name;
        document.getElementById('editFolderColor').value = folders[index].color || '#1e1e1e';
        document.getElementById('editFolderModal').style.display = 'flex';
        document.getElementById('editFolderName').focus();
    }

    function saveEditFolder() {
        const index = document.getElementById('editFolderIndex').value;
        folders[index].name = document.getElementById('editFolderName').value.trim();
        folders[index].color = document.getElementById('editFolderColor').value;
        saveAndRender();
        closeModal('editFolderModal');
    }

    // 3. THAO TÁC LINK
    function openModal(folderId) {
        document.getElementById('targetFolderId').value = folderId;
        document.getElementById('modalLinkName').value = '';
        document.getElementById('modalLinkUrl').value = '';
        document.getElementById('linkModal').style.display = 'flex';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function saveNewLink() {
        const folderId = document.getElementById('targetFolderId').value;
        const name = document.getElementById('modalLinkName').value.trim();
        let url = document.getElementById('modalLinkUrl').value.trim();
        if (!name || !url) return;
        if (!url.startsWith('http')) url = 'https://' + url;

        const folder = folders.find(f => f.id === folderId);
        if (folder) {
            folder.links.push({ id: 'l_' + Date.now(), name: name, url: url });
            saveAndRender();
            closeModal('linkModal');
        }
    }

    function openEditLink(fIndex, lId) {
        const link = folders[fIndex].links.find(l => l.id === lId);
        document.getElementById('editFolderIndexTarget').value = fIndex;
        document.getElementById('editLinkIdTarget').value = lId;
        document.getElementById('editLinkName').value = link.name;
        document.getElementById('editLinkUrl').value = link.url;
        document.getElementById('editLinkModal').style.display = 'flex';
    }

    function saveEditLink() {
        const fIdx = document.getElementById('editFolderIndexTarget').value;
        const lId = document.getElementById('editLinkIdTarget').value;
        const link = folders[fIdx].links.find(l => l.id === lId);
        link.name = document.getElementById('editLinkName').value.trim();
        link.url = document.getElementById('editLinkUrl').value.trim();
        saveAndRender();
        closeModal('editLinkModal');
    }

    function deleteLink(fIndex, lId) {
        if(confirm("Xóa link này?")) {
            folders[fIndex].links = folders[fIndex].links.filter(l => l.id !== lId);
            saveAndRender();
        }
    }

    // 4. IMPORT & EXPORT DỮ LIỆU
    function exportData() {
        const data = { folders: folders, currentFontSize: currentFontSize };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `bookmarks_backup_${new Date().toLocaleDateString().replace(/\//g,'-')}.json`;
        a.click();
    }

    function triggerImport() { document.getElementById('importFile').click(); }

    function handleImport(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = JSON.parse(evt.target.result);
                if (data.folders) {
                    folders = data.folders;
                    currentFontSize = data.currentFontSize || 22;
                    applyFontSize();
                    saveAndRender();
                    alert("Dữ liệu đã được nhập thành công!");
                } else {
                    alert("File không đúng định dạng!");
                }
            } catch (err) {
                alert("Lỗi khi đọc file!");
            }
        };
        reader.readAsText(file);
        e.target.value = '';
    }

    // 5. CÁC CHỨC NĂNG KHÁC
    function changeFontSize(step) {
        currentFontSize = Math.min(Math.max(currentFontSize + step, 12), 40);
        applyFontSize();
        saveAndRender();
    }

    function applyFontSize() {
        document.documentElement.style.setProperty('--link-font-size', currentFontSize + 'px');
        document.getElementById('fontSizeDisplay').innerText = currentFontSize;
    }

    function exportHTML() {
        const currentHTML = document.documentElement.outerHTML;
        const regex = /\/\/ --- DATA_START ---[\s\S]*?\/\/ --- DATA_END ---/;
        const dataString = `// --- DATA_START ---\nvar INITIAL_DATA = ${JSON.stringify(folders)};\nvar INITIAL_FONT_SIZE = ${currentFontSize};\n// --- DATA_END ---`;
        const newHTML = "<!DOCTYPE html>\n<html lang=\"vi\">\n" + currentHTML.replace(regex, dataString) + "\n</html>";
        const blob = new Blob([newHTML], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Link_Manager_Portable.html';
        a.click();
    }

    // 6. DRAG & DROP
    function handleFolderDragStart(e, index) {
        if(e.target.closest('.links-list li')) return;
        draggedType = 'folder';
        draggedFolderIndex = index;
        setTimeout(() => e.target.style.opacity = "0.5", 0);
    }

    function handleFolderDrop(e, targetIndex) {
        e.preventDefault();
        if (draggedType === 'folder' && draggedFolderIndex !== targetIndex) {
            const item = folders.splice(draggedFolderIndex, 1)[0];
            folders.splice(targetIndex, 0, item);
            saveAndRender();
        } else if (draggedType === 'link' && draggedLinkInfo && !e.target.closest('li')) {
            const link = folders[draggedLinkInfo.fIndex].links.splice(draggedLinkInfo.lIndex, 1)[0];
            folders[targetIndex].links.push(link);
            saveAndRender();
        }
    }

    function handleLinkDragStart(e, fIdx, lIdx) {
        e.stopPropagation();
        draggedType = 'link';
        draggedLinkInfo = { fIndex: fIdx, lIndex: lIdx };
        setTimeout(() => e.target.style.opacity = "0.5", 0);
    }

    function handleLinkDrop(e, targetFIdx, targetLIdx) {
        e.preventDefault(); e.stopPropagation();
        if (draggedType === 'link' && draggedLinkInfo) {
            const { fIndex, lIndex } = draggedLinkInfo;
            const link = folders[fIndex].links.splice(lIndex, 1)[0];
            folders[targetFIdx].links.splice(targetLIdx, 0, link);
            saveAndRender();
        }
    }

    // 7. RENDER
    function render() {
        const container = document.getElementById('foldersContainer');
        container.innerHTML = '';
        folders.forEach((folder, fIndex) => {
            const box = document.createElement('div');
            box.className = `folder-box ${folder.isCollapsed ? 'collapsed' : ''}`;
            
            // Cài đặt kéo thả dựa trên trạng thái nút Bật/Tắt
            if (isDragEnabled) {
                box.setAttribute('draggable', 'true');
                box.ondragstart = (e) => handleFolderDragStart(e, fIndex);
                box.ondragend = (e) => { e.target.style.opacity = "1"; document.querySelectorAll('.folder-box').forEach(b => b.classList.remove('drag-over')); };
                box.ondragover = (e) => e.preventDefault();
                box.ondragenter = (e) => e.target.closest('.folder-box')?.classList.add('drag-over');
                box.ondragleave = (e) => e.target.closest('.folder-box')?.classList.remove('drag-over');
                box.ondrop = (e) => handleFolderDrop(e, fIndex);
            } else {
                box.removeAttribute('draggable');
            }

            box.innerHTML = `
                <div class="folder-header" style="background-color: ${folder.color || '#1e1e1e'}">
                    <div class="folder-title" onclick="toggleFolder(${fIndex})">
                        <i class="fas fa-cog" onclick="event.stopPropagation(); openEditFolder(${fIndex})"></i>
                        <span>${folder.name}</span>
                    </div>
                    <div class="folder-actions">
                        <i class="fas fa-plus-circle btn-mini btn-add-link" onclick="openModal('${folder.id}')"></i>
                        <i class="fas fa-chevron-up btn-mini" onclick="toggleFolder(${fIndex})"></i>
                        <i class="fas fa-trash-alt btn-mini btn-delete" onclick="deleteFolder(${fIndex})"></i>
                    </div>
                </div>
                <div class="folder-box-content">
                    <ul class="links-list">
                        ${folder.links.map((link, lIndex) => `
                            <li ${isDragEnabled ? `draggable="true" ondragstart="handleLinkDragStart(event, ${fIndex}, ${lIndex})" ondragend="this.style.opacity='1'" ondrop="handleLinkDrop(event, ${fIndex}, ${lIndex})" ondragover="event.preventDefault()"` : ''}>
                                <a href="${link.url}" target="_blank">
                                    <i class="fas fa-edit link-icon" onclick="event.preventDefault(); event.stopPropagation(); openEditLink(${fIndex}, '${link.id}')"></i>
                                    ${link.name}
                                </a>
                                <i class="fas fa-times btn-mini btn-delete" onclick="deleteLink(${fIndex}, '${link.id}')"></i>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
            container.appendChild(box);
        });
    }

    function expandAll() {
        folders.forEach(folder => { folder.isCollapsed = false; });
        saveAndRender(); 
    }

    function collapseAll() {
        folders.forEach(folder => { folder.isCollapsed = true; });
        saveAndRender(); 
    }
    
    init();
</script>
</body>
</html>
